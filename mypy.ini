[mypy]
python_version = 3.14

strict = true
strict_optional = true
strict_equality = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
no_implicit_reexport = true

warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
warn_redundant_casts = true
; warn_unused_imports = true
warn_unreachable = true

; ignore_missing_imports = true

allow_subclassing_any = false
allow_untyped_decorators = false

show_error_codes = true
pretty = true
color_output = true

# ---------------------------------------------------------------------------
# Tests are allowed to use ``Only[T1, T2, ...]`` as a runtime expression
# (the value returned by ``Only.__class_getitem__``).  Mypy does not know
# about that custom hook and would otherwise complain that ``Only`` is
# not a generic class.  We relax the corresponding checks here.
# ---------------------------------------------------------------------------
[mypy-tests.*]
disallow_untyped_calls = false
warn_return_any = false
warn_unreachable = false
# ``Only`` overrides ``__class_getitem__`` to return a runtime instance
# (not a parameterized type), which mypy cannot model.  Suppress the
# resulting ``misc`` / ``type-arg`` errors in the test suite.
disable_error_code = misc, type-arg
